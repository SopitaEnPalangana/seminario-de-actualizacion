<!--
Desarrolle un WebComponent tipo "Formulario" que le permita cargar toda la información pertinente de la factura de AFIP adjuntada. 
Este WebComponent deberá tener un botón "Generar factura" que deberá abrir una pestaña nueva con una gráfica del diseño de la factura solicitada

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio5</title>
</head>
<body></body>
<script>
    class Ejercicio5 extends HTMLElement
    {
        constructor()
        {
            super()
                    
            this.container = document.createElement('div');
            this.container.className = 'container';
            
            this.invoicemaker= document.createElement('H1');
            this.invoicemaker.textContent = "INVOICE MAKER";

            this.defaultdata = document.createElement('p');
            this.defaultdata.innerText = `Razon Social: Sopita SCS
                Domicilio Comercial: Av. Siempre Viva 1234
                Condición: IVA Resposable Inscripto
                CUIT: 27-12345678-4
                Ingresos Brutos: 
                Fecha de inicio de Actividades: 01/01/1980

                ---FACTURA B---
                Punto de Venta: 0002
                Comp Nro: 00000641
                ----------------------
                `;

            this.invoiceform = document.createElement('form');
            this.invoiceform.action = '/invoice';
            this.invoiceform.method = 'POST';

            this.periodolabel = document.createElement('label');
            this.periodolabel.innerText = 'Periodo Facturado desde: '
            this.periodostart = document.createElement('input');
            this.periodostart.name = "periodostart";
            this.periodostart.placeholder = "DD/MM/AAAA";
            this.periodolabel2 = document.createElement('label');
            this.periodolabel2.innerText = 'hasta: ';
            this.periodolabel2.style = "margin-left: 10px";
            this.periodofin = document.createElement('input');
            this.periodofin.name = "periodofin";
            this.periodofin.placeholder = "DD/MM/AAAA";

            this.cuitlabel = document.createElement('label');
            this.cuitlabel.innerText = '\n \nCUIT:';
            this.cuit = document.createElement('input');
            this.cuit.name = 'cuit';
            this.cuit.placeholder = 'xxxxxxxxxx';
            this.searchcuitbtn = document.createElement('button');
            this.searchcuitbtn.innerText = 'Buscar CUIT';
            this.searchcuitbtn.type = "button";
            this.searchcuitbtn.style = "margin-left: 10px";

            this.ApyNolabel = document.createElement('label');
            this.ApyNolabel.innerText = '\n \n Apellido y Nombre/Razon Social: ';
            this.ApyNo = document.createElement('input');
            this.ApyNo.name = "apellidoynombre";
            this.condicionIVAlabel = document.createElement('label');
            this.condicionIVAlabel.innerText = 'Condicion frente al IVA: ';
            this.condicionIVA = document.createElement('input');
            this.condicionIVA.name = "condicionIVA";
            this.domiciliolabel = document.createElement('label');
            this.domiciliolabel.innerText = '\n \n Domicilio: ';
            this.domicilio = document.createElement('input');
            this.domicilio.name = "domicilio";
            this.condicionventalabel = document.createElement('label');
            this.condicionventalabel.innerText = 'Condicion de Venta: ';
            this.condicionventa = document.createElement('input');
            this.condicionventa.name = "condicionventa";

            //ingresar productos
            this.productdiv = document.createElement('div');
            this.newproductbtn = document.createElement('button');
            this.newproductbtn.innerText= 'Agregar Producto';
            this.newproductbtn.type = "button";

            this.productdiv.appendChild(this.newproductbtn);

            this.productslist = [];

            this.productsHidden = document.createElement('input');
            this.productsHidden.type = 'hidden';
            this.productsHidden.name = 'products';

            this.boton = document.createElement('button');
            this.boton.innerText = 'Submit';
            this.boton.type = 'submit';

            this.container.appendChild(this.invoicemaker);
            this.container.appendChild(this.defaultdata);

            this.invoiceform.appendChild(this.periodolabel);
            this.invoiceform.appendChild(this.periodostart);
            this.invoiceform.appendChild(this.periodolabel2);
            this.invoiceform.appendChild(this.periodofin);
            this.invoiceform.appendChild(this.cuitlabel);
            this.invoiceform.appendChild(this.cuit);
            this.invoiceform.appendChild(this.searchcuitbtn);
            this.invoiceform.appendChild(this.ApyNolabel);
            this.invoiceform.appendChild(this.ApyNo);
            this.invoiceform.appendChild(this.condicionIVAlabel);
            this.invoiceform.appendChild(this.condicionIVA);
            this.invoiceform.appendChild(this.domiciliolabel);
            this.invoiceform.appendChild(this.domicilio);
            this.invoiceform.appendChild(this.condicionventalabel);
            this.invoiceform.appendChild(this.condicionventa);
            this.invoiceform.appendChild(this.productsHidden);
            this.invoiceform.appendChild(this.productdiv);
            
            this.invoiceform.appendChild(this.boton);
            
            this.appendChild(this.container);
            this.appendChild(this.invoiceform);
        }

        onnewproductbtnclick()
        {
            const productrow = document.createElement('div');

            const productolabel = document.createElement('label');
            productolabel.innerText = "\n \n Producto / Servicio: ";
            const producto = document.createElement('input');

            const cantidadlabel = document.createElement('label');
            cantidadlabel.innerText = "\n Cantidad: ";
            const cantidad = document.createElement('input');

            const unidadmedidalabel = document.createElement('label');
            unidadmedidalabel.innerText = " U. Medida: ";
            const unidadmedida = document.createElement('input');
            unidadmedida.placeholder = "m / kg / unidad / otras unidades";

            const preciounitlabel = document.createElement('label');
            preciounitlabel.innerText = "\n Precio Unitario: $";
            const preciounit = document.createElement('input');

            const bonificalabel = document.createElement('label');
            bonificalabel.innerText = "\n % Bonificación: " ;
            const bonifica = document.createElement('input');

            const subtotallabel = document.createElement('label');
            subtotallabel.innerText = "\n Subtotal: ";
            const subtotal = document.createElement('label');
            subtotal.innerText = '';

            const confirmbtn = document.createElement('button');
            confirmbtn.innerText = "Confirmar producto";
            confirmbtn.type = "button";

            confirmbtn.onclick = () => {
                const costo = eval(preciounit.value * cantidad.value);
                const desc = eval(costo*bonifica.value/100)
                subtotal.value = eval(costo-desc);
                subtotal.innerText = subtotal.value;


                const product = {
                    producto: producto.value,
                    cantidad: cantidad.value,
                    unidad: unidadmedida.value,
                    precio: preciounit.value,
                    bonificacion: bonifica.value,
                    subtotal: subtotal.value
                };
                this.productslist.push(product);
                this.productsHidden.value = JSON.stringify(this.productslist);
                
                [producto, cantidad, unidadmedida, preciounit, bonifica, confirmbtn]
                    .forEach(dato => dato.disabled = true);

                console.log("Productos cargados: ", this.productslist);
            }

            productrow.appendChild(productolabel);
            productrow.appendChild(producto);
            productrow.appendChild(cantidadlabel);
            productrow.appendChild(cantidad);
            productrow.appendChild(unidadmedidalabel);
            productrow.appendChild(unidadmedida);
            productrow.appendChild(preciounitlabel);
            productrow.appendChild(preciounit);
            productrow.appendChild(bonificalabel);
            productrow.appendChild(bonifica);
            productrow.appendChild(subtotallabel);
            productrow.appendChild(subtotal);
            productrow.appendChild(confirmbtn);
            
            this.productdiv.appendChild(productrow);

        } 



        onsearchcuitbtnclick()
        {
            if(this.cuit.value === "30522763922")
            {
                this.ApyNo.value = "INSSJP";
                this.condicionIVA.value = "IVA Sujeto Exento";
                this.domicilio.value = "Peru 169 - Capital Federal, CABA";
                this.condicionventa.value = "Cuenta Corriente";
            }
        }

        onbotonclick()
        {
            console.log("Generando factura");

        }
        connectedCallback()
        {
            this.boton.onclick = this.onbotonclick.bind(this);
            this.searchcuitbtn.onclick = this.onsearchcuitbtnclick.bind(this);
            this.newproductbtn.onclick = this.onnewproductbtnclick.bind(this);
        }

        disconnectedCallback()
        {
            this.boton.onclick = null;
            this.searchcuitbtn.onclick = null;
            this.newproductbtn.onclick = null;
        }

    }

    customElements.define('x-ejercicio5', Ejercicio5);
    function main()
    {
        let miEjercicio = new Ejercicio5;
        document.body.appendChild(miEjercicio);
    }
    window.onload = main;
</script>
</html>
